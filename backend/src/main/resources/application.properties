spring.application.name=gestion-flota
# spring.data.mongodb.uri se resuelve automáticamente desde SPRING_DATA_MONGODB_URI (Railway)
server.port=${PORT:8080}
spring.jackson.serialization.fail-on-empty-beans=false

# JWT — override JWT_SECRET in Railway env vars before going to production
jwt.secret=${JWT_SECRET:carcaresaas-jwt-secret-key-change-me-in-prod!!}
jwt.expiration=86400000

# CORS — set CORS_ORIGINS in Railway to your frontend URL
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://10.0.2.2:3000}
